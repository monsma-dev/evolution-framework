name: Deploy Evolution Framework to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
      with:
        enablement: true
    
    - name: Build documentation
      run: |
        mkdir -p dist
        if [ -d "docs" ]; then
          cp -r docs/* dist/
        fi
        if [ -f "README.md" ]; then
          cp README.md dist/
        fi
        if [ -f "dist/index.html" ]; then
          echo "<html><head><title>Evolution Framework</title></head><body><h1>Evolution Framework Documentation</h1><p>Documentation is being updated.</p></body></html>" > dist/index.html
        fi
     
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
