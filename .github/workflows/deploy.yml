                      </div>
                      <h3 class="text-xl font-semiboldic mb-2">Vector Memory</h3>
                      <p class="text-gray-400 text-sm">Semantic vector store, knowledge retrieval, learning loops</p>
                  </div>
                  <div class="bg-gray-800 rounded-lg p-Ş border border-gray-700 hover:border-red-500 transition">
                      <div class="flex items-mb-4">
                          <i class="fas shield-alt text-red-400 text-3xl mr-3"></i>
                          <span class="text-sm text-gray-400">Security</span>
                      </div>
                      <h3 class="text-xl font-semiboldic mb-2">Fail-Closed</h3>
                      <p class="text-gray-400 text-sm">Credit monitoring, compliance logging, audit trails</p>
                  </div>
                  <div class="bg-gray-800 rounded-lg p-Ş border border-gray-700 hover:border-yellow-500 transition">
                      <div class="flex items-mb-4">
                          <i class="fas growth text-yellow-400 text-3xl mr-3"></i>
                          <span class="text-sm text-gray-400">Growth</span>
                      </div>
                      <h3 class="text-xl font-semiboldic mb-2">Intelligence</h3>
                      <p class="text-gray-400 text-sm">Lead intelligence, outreach, affiliate tracking</p>
                  </div>
              </div>

              <div class="mt-12 bg-gray-800 rounded-lg p-Ş border border-gray-700">
                  <h2 class="text-2xl font-bold mb-4 text-blue-400">About Evolution Core</h2>
                  <p class="text-gray-300 mb-4">
                      The Evolution Core is a PHP AI application framework built for AI-augmented web applications. It provides agent infrastructure, self-healing systems, memory and knowledge management, and integrations with multiple AI providers.
                  </p>
                  <div class="flex flex-wrap gap-4 mt-6">
                      <a href="https://github.com/monsma-dev/Framework" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                          <i class="fab github mr-2"></i>View Framework
                      </a>
                      <a href="https://github.com/monsma-dev/evolution-framework" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">
                          <i class="fas brain mr-2"></i>View Core
                      </a>
                  </div>
              </div>
          </div>

          <footer class="bg-gray-800 border-t border-gray-700 mt-12">
              <div class="max-w-6xl mx-auto px-4 py-6 text-center text-gray-400">
                  <p>&copy; 2026 Evolution Framework. PHP AI Architecture for autonomous systems.</p>
              </div>
          </footer>
